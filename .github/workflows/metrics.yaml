# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
  # Schedule updates (daily)
  schedule: [{cron: "0 1 * * *"}]
  # Allow manual runs
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.GITHUB_TOKEN }}

          # Commit the generated SVG to the `output` branch instead of `main`
          # so that main's history is not bloated by the daily ~1MB SVG update.
          committer_branch: output
          committer_message: "Update github-metrics.svg [skip ci]"
          output_action: commit

          # Options
          user: yankay
          template: classic
          base: header, activity, community
          config_timezone: Asia/Shanghai
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_notable: yes
