# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
  # Schedule updates daily.
  schedule: [{cron: "0 1 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Ensure metrics render branch exists
        run: |
          if git ls-remote --exit-code --heads origin metrics-renders >/dev/null; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --orphan metrics-renders
          git rm -rf --ignore-unmatch .
          printf "# Metrics renders\n" > README.md
          git add README.md
          git commit -m "chore: initialize metrics renders"
          git push origin metrics-renders
          git switch main

      - uses: lowlighter/metrics@v3.34
        with:
          # Your GitHub token
          token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          filename: github-metrics.svg
          output_action: commit
          output_condition: data-changed
          committer_branch: metrics-renders
          user: yankay
          template: classic
          base: header, activity, community
          config_timezone: Asia/Shanghai
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_notable: yes
